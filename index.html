<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#667eea">
<link rel="manifest" href="./manifest.json">
<title>Cruise Planner</title>

<style>
/* ===== YOUR ORIGINAL STYLES (UNCHANGED) ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding-bottom: 80px;
}
.header {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: white;
    padding: 30px 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    text-align: center;
}
.header h1 { font-size: 2.2em; margin-bottom: 5px; }
.container { padding: 15px; }

/* ===== NEW PRINT BUTTON ===== */
.print-btn {
    margin-top: 10px;
    padding: 10px 16px;
    background: white;
    color: #2a5298;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
}

/* ===== PRINT STYLES (BOOKLET STYLE) ===== */
@media print {

    body * {
        visibility: hidden;
    }

    #printable, #printable * {
        visibility: visible;
    }

    #printable {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        background: white;
        color: black;
        padding: 30px;
    }

    .print-page {
        page-break-after: always;
    }

    .print-title {
        font-size: 28px;
        font-weight: 900;
        text-align: center;
        margin-bottom: 20px;
    }

    .print-section {
        margin-bottom: 20px;
    }

    .print-box {
        border: 2px solid #333;
        padding: 10px;
        margin-bottom: 10px;
    }

    button, nav {
        display: none !important;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>🚢 Cruise Planner</h1>
    <p>Your collaborative trip organizer</p>

    <!-- ✅ PRINT BUTTON -->
    <button class="print-btn" onclick="printPlanner()">🖨️ Print Planner</button>
</div>

<div class="container" id="main-content"></div>

<!-- ✅ PRINTABLE CONTENT (HIDDEN UNTIL PRINT) -->
<div id="printable"></div>

<nav class="bottom-nav">
    <!-- unchanged nav -->
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIza...",
    authDomain: "cruise-planner-2026.firebaseapp.com",
    projectId: "cruise-planner-2026"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let activeTripId = null;

/* ===== PRINT FUNCTION ===== */
async function printPlanner() {

    if (!activeTripId) return alert("No trip found");

    const tripDoc = await db.collection('trips').doc(activeTripId).get();
    const trip = tripDoc.data();

    const itinerary = await db.collection('trips').doc(activeTripId).collection('itinerary').get();
    const packing = await db.collection('trips').doc(activeTripId).collection('packing').get();
    const notes = await db.collection('trips').doc(activeTripId).collection('notes').get();

    let itineraryHTML = '';
    itinerary.forEach(doc => {
        const d = doc.data();
        itineraryHTML += `<div class="print-box">${d.title || 'Activity'} - ${d.time || ''}</div>`;
    });

    let packingHTML = '';
    packing.forEach(doc => {
        const d = doc.data();
        packingHTML += `<div class="print-box">☐ ${d.name}</div>`;
    });

    let notesHTML = '';
    notes.forEach(doc => {
        const d = doc.data();
        notesHTML += `<div class="print-box">${d.text || ''}</div>`;
    });

    document.getElementById('printable').innerHTML = `
        
        <!-- COVER PAGE -->
        <div class="print-page">
            <div class="print-title">🚢 Cruise Planner</div>
            <div class="print-section">
                <strong>${trip.name}</strong><br>
                ${trip.startDate} - ${trip.endDate}
            </div>
        </div>

        <!-- ITINERARY -->
        <div class="print-page">
            <div class="print-title">🗺️ Itinerary</div>
            ${itineraryHTML || 'No activities added'}
        </div>

        <!-- PACKING -->
        <div class="print-page">
            <div class="print-title">🧳 Packing List</div>
            ${packingHTML || 'No items added'}
        </div>

        <!-- NOTES -->
        <div class="print-page">
            <div class="print-title">📝 Notes</div>
            ${notesHTML || 'No notes added'}
        </div>
    `;

    window.print();
}

/* ===== EXISTING AUTH ===== */
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        window.location.href = 'login.html';
    } else {
        currentUser = user;
        activeTripId = localStorage.getItem('activeTripId');
    }
});
</script>

</body>
</html>
