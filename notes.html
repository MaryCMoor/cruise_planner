<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4facfe">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Notes - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 1.8em; }
        .container { padding: 15px; }
        .no-trip-banner {
            background: white;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .no-trip-banner h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .no-trip-banner p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .btn-setup {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .add-note-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .add-note-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 10px;
            font-size: 1em;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn-add {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .notes-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .note-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .note-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-category {
            background: #667eea;
            color: white;
        }
        .badge-priority {
            background: #e74c3c;
            color: white;
        }
        .note-actions {
            display: flex;
            gap: 5px;
        }
        .btn-icon {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-edit { background: #3498db; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .note-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            padding-right: 70px;
        }
        .note-text {
            color: #34495e;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .btn-secondary { background: #e0e0e0; color: #2c3e50; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            font-weight: 600;
            padding: 8px 12px;
            min-width: 60px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.8em; margin-bottom: 4px; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 Trip Notes</h1>
    </div>

    <div class="container" id="main-content"></div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">✏️ Edit Note</div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="edit-category">
                    <option value="General">General</option>
                    <option value="Excursions">Excursions</option>
                    <option value="Dining">Dining</option>
                    <option value="Packing">Packing</option>
                    <option value="Travel">Travel</option>
                    <option value="Budget">Budget</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Title</label>
                <input type="text" id="edit-title" placeholder="Note title">
            </div>

            <div class="form-group">
                <label>Note</label>
                <textarea id="edit-text" placeholder="Your note..."></textarea>
            </div>

            <div class="form-group">
                <label>Priority</label>
                <select id="edit-priority">
                    <option value="normal">Normal</option>
                    <option value="high">High Priority</option>
                </select>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="packing.html" class="nav-item">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item active">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
        <a href="settings.html" class="nav-item">
            <div class="nav-item-icon">⚙️</div>
            <div>Settings</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        db.enablePersistence({ synchronizeTabs: true })
          .catch((err) => console.log('Offline persistence:', err.code));
        
        let currentUser = null;
        let activeTripId = null;
        let allNotes = [];
        let editingNoteId = null;
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                await checkActiveTrip();
            }
        });
        
        async function checkActiveTrip() {
            activeTripId = localStorage.getItem('activeTripId');
            
            if (!activeTripId) {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const userData = userDoc.data();
                activeTripId = userData?.activeTrip;
                if (activeTripId) {
                    localStorage.setItem('activeTripId', activeTripId);
                }
            }
            
            if (!activeTripId) {
                showNoTripMessage();
            } else {
                loadNotes();
            }
        }
        
        function showNoTripMessage() {
            document.getElementById('main-content').innerHTML = `
                <div class="no-trip-banner">
                    <h2>🚢 No Active Trip</h2>
                    <p>Create a trip in Settings to start taking notes!</p>
                    <a href="settings.html" class="btn-setup">Go to Settings</a>
                </div>
            `;
        }
        
        async function loadNotes() {
            const snapshot = await db.collection('trips').doc(activeTripId)
                .collection('notes').orderBy('createdAt', 'desc').get();
            
            allNotes = [];
            snapshot.forEach(doc => {
                allNotes.push({id: doc.id, ...doc.data()});
            });
            
            displayUI();
        }
        
        function displayUI() {
            const container = document.getElementById('main-content');
            
            container.innerHTML = `
                <div class="add-note-card">
                    <div class="add-note-header">➕ Add Note</div>
                    <div class="form-row">
                        <select id="note-category">
                            <option value="General">General</option>
                            <option value="Excursions">Excursions</option>
                            <option value="Dining">Dining</option>
                            <option value="Packing">Packing</option>
                            <option value="Travel">Travel</option>
                            <option value="Budget">Budget</option>
                            <option value="Other">Other</option>
                        </select>
                        <select id="note-priority">
                            <option value="normal">Normal</option>
                            <option value="high">High Priority</option>
                        </select>
                    </div>
                    <input type="text" id="note-title" placeholder="Note title" style="margin-bottom: 10px;">
                    <textarea id="note-text" placeholder="Your note..."></textarea>
                    <button class="btn-add" onclick="addNote()">Add Note</button>
                </div>

                <div class="notes-container" id="notes-container"></div>
            `;
            
            displayNotes();
        }
        
        function displayNotes() {
            const container = document.getElementById('notes-container');
            
            if (allNotes.length === 0) {
                container.innerHTML = '<div class="empty-state">No notes yet. Add your first note above!</div>';
                return;
            }
            
            let html = '';
            allNotes.forEach(note => {
                html += `
                    <div class="note-card">
                        <div class="note-header">
                            <div class="note-badges">
                                <span class="badge badge-category">${note.category || 'General'}</span>
                                ${note.priority === 'high' ? '<span class="badge badge-priority">HIGH PRIORITY</span>' : ''}
                            </div>
                            <div class="note-actions">
                                <button class="btn-icon btn-edit" onclick="openEditModal('${note.id}')">✏️</button>
                                <button class="btn-icon btn-delete" onclick="deleteNote('${note.id}')">🗑️</button>
                            </div>
                        </div>
                        ${note.title ? `<div class="note-title">${note.title}</div>` : ''}
                        <div class="note-text">${note.text || ''}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        async function addNote() {
            const category = document.getElementById('note-category').value;
            const priority = document.getElementById('note-priority').value;
            const title = document.getElementById('note-title').value.trim();
            const text = document.getElementById('note-text').value.trim();
            
            if (!text && !title) {
                alert('Please enter a note or title');
                return;
            }
            
            await db.collection('trips').doc(activeTripId).collection('notes').add({
                category: category,
                priority: priority,
                title: title,
                text: text,
                addedBy: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('note-category').value = 'General';
            document.getElementById('note-priority').value = 'normal';
            document.getElementById('note-title').value = '';
            document.getElementById('note-text').value = '';
            
            loadNotes();
        }
        
        async function openEditModal(noteId) {
            editingNoteId = noteId;
            
            const doc = await db.collection('trips').doc(activeTripId)
                .collection('notes').doc(noteId).get();
            
            if (doc.exists) {
                const note = doc.data();
                document.getElementById('edit-category').value = note.category || 'General';
                document.getElementById('edit-priority').value = note.priority || 'normal';
                document.getElementById('edit-title').value = note.title || '';
                document.getElementById('edit-text').value = note.text || '';
                
                document.getElementById('edit-modal').classList.add('show');
            }
        }
        
        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('show');
            editingNoteId = null;
        }
        
        async function saveEdit() {
            const category = document.getElementById('edit-category').value;
            const priority = document.getElementById('edit-priority').value;
            const title = document.getElementById('edit-title').value.trim();
            const text = document.getElementById('edit-text').value.trim();
            
            if (!text && !title) {
                alert('Please enter a note or title');
                return;
            }
            
            await db.collection('trips').doc(activeTripId)
                .collection('notes').doc(editingNoteId).update({
                    category: category,
                    priority: priority,
                    title: title,
                    text: text
                });
            
            closeEditModal();
            loadNotes();
        }
        
        async function deleteNote(noteId) {
            if (confirm('Delete this note?')) {
                await db.collection('trips').doc(activeTripId)
                    .collection('notes').doc(noteId).delete();
                loadNotes();
            }
        }
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then((reg) => console.log('✅ Service Worker registered'))
                .catch((err) => console.log('❌ Service Worker failed:', err));
        });
    }
    </script>
</body>
</html>
