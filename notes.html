<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Notes - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 2.2em; margin-bottom: 5px; }
        .header p { opacity: 0.9; }
        .container { padding: 15px; }
        .add-note-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .filter-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            white-space: nowrap;
            color: #555;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-color: #4facfe;
        }
        .note-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #4facfe;
        }
        .note-card.general { border-left-color: #3498db; }
        .note-card.restaurants { border-left-color: #e74c3c; }
        .note-card.excursions { border-left-color: #f39c12; }
        .note-card.accommodations { border-left-color: #9b59b6; }
        .note-card.transportation { border-left-color: #1abc9c; }
        .note-card.shopping { border-left-color: #e91e63; }
        .note-card.tips { border-left-color: #27ae60; }
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .note-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            flex: 1;
        }
        .note-priority {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 700;
            margin-left: 10px;
        }
        .priority-high {
            background: #fee;
            color: #c00;
        }
        .priority-normal {
            background: #e8f4f8;
            color: #0288d1;
        }
        .note-category {
            display: inline-block;
            padding: 4px 10px;
            background: #f0f0f0;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
        }
        .note-text {
            color: #2c3e50;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }
        .note-actions {
            display: flex;
            gap: 8px;
        }
        .btn-edit, .btn-delete {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
        }
        .btn-edit {
            background: #3498db;
            color: white;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        .no-notes {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }
        .no-notes-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-header {
            font-size: 1.5em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-label {
            display: block;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        .btn-save, .btn-cancel {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1em;
            margin-right: 10px;
        }
        .btn-save {
            background: #27ae60;
            color: white;
        }
        .btn-cancel {
            background: #95a5a6;
            color: white;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.6em;
            font-weight: 600;
            padding: 8px 6px;
            min-width: 48px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.6em; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 Trip Notes</h1>
        <p>Important information & reminders</p>
    </div>

    <div class="container">
        <button class="add-note-btn" onclick="showAddNoteModal()">+ Add Note</button>

        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterNotes('all')">All</button>
            <button class="filter-btn" onclick="filterNotes('general')">General</button>
            <button class="filter-btn" onclick="filterNotes('restaurants')">Restaurants</button>
            <button class="filter-btn" onclick="filterNotes('excursions')">Excursions</button>
            <button class="filter-btn" onclick="filterNotes('accommodations')">Hotels</button>
            <button class="filter-btn" onclick="filterNotes('transportation')">Transport</button>
            <button class="filter-btn" onclick="filterNotes('shopping')">Shopping</button>
            <button class="filter-btn" onclick="filterNotes('tips')">Tips</button>
        </div>

        <div id="notes-container"></div>
    </div>

    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">Add Note</div>
            <form id="noteForm">
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select id="category" class="form-select" required>
                        <option value="general">General</option>
                        <option value="restaurants">Restaurants</option>
                        <option value="excursions">Excursions</option>
                        <option value="accommodations">Accommodations</option>
                        <option value="transportation">Transportation</option>
                        <option value="shopping">Shopping</option>
                        <option value="tips">Tips & Advice</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" id="title" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Note Content *</label>
                    <textarea id="text" class="form-textarea" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select id="priority" class="form-select">
                        <option value="normal">Normal</option>
                        <option value="high">High Priority</option>
                    </select>
                </div>
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn-save">Save Note</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="schedule.html" class="nav-item">
            <div class="nav-item-icon">🗓️</div>
            <div>Days</div>
        </a>
        <a href="packing.html" class="nav-item">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item active">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
        <a href="journal.html" class="nav-item">
            <div class="nav-item-icon">📔</div>
            <div>Journal</div>
        </a>
        <a href="settings.html" class="nav-item">
            <div class="nav-item-icon">⚙️</div>
            <div>Set</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        db.enablePersistence({ synchronizeTabs: true }).catch((err) => console.log('Offline:', err.code));
        
        let currentUser = null;
        let activeTripId = null;
        let editingNoteId = null;
        let allNotes = [];
        let currentFilter = 'all';
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                activeTripId = localStorage.getItem('activeTripId');
                if (!activeTripId) {
                    alert('No active trip. Go to Settings to create one.');
                    window.location.href = 'settings.html';
                } else {
                    await loadNotes();
                }
            }
        });
        
        async function loadNotes() {
            const snapshot = await db.collection('trips').doc(activeTripId).collection('notes').get();
            allNotes = [];
            snapshot.forEach(doc => {
                allNotes.push({ id: doc.id, ...doc.data() });
            });
            
            renderNotes();
        }
        
        function filterNotes(category) {
            currentFilter = category;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderNotes();
        }
        
        function renderNotes() {
            let filteredNotes = allNotes;
            if (currentFilter !== 'all') {
                filteredNotes = allNotes.filter(n => n.category === currentFilter);
            }
            
            filteredNotes.sort((a, b) => {
                if (a.priority === 'high' && b.priority !== 'high') return -1;
                if (a.priority !== 'high' && b.priority === 'high') return 1;
                return 0;
            });
            
            const container = document.getElementById('notes-container');
            
            if (filteredNotes.length === 0) {
                container.innerHTML = `
                    <div class="no-notes">
                        <div class="no-notes-icon">📝</div>
                        <div>No notes found${currentFilter !== 'all' ? ' in this category' : ''}</div>
                    </div>
                `;
                return;
            }
            
            const categoryLabels = {
                'general': 'General',
                'restaurants': 'Restaurants',
                'excursions': 'Excursions',
                'accommodations': 'Accommodations',
                'transportation': 'Transportation',
                'shopping': 'Shopping',
                'tips': 'Tips & Advice'
            };
            
            container.innerHTML = filteredNotes.map(note => `
                <div class="note-card ${note.category}">
                    <div class="note-header">
                        <div class="note-title">${note.title}</div>
                        ${note.priority === 'high' ? '<div class="note-priority priority-high">HIGH PRIORITY</div>' : ''}
                    </div>
                    <div class="note-category">${categoryLabels[note.category] || note.category}</div>
                    <div class="note-text">${note.text}</div>
                    <div class="note-actions">
                        <button class="btn-edit" onclick="editNote('${note.id}')">Edit</button>
                        <button class="btn-delete" onclick="deleteNote('${note.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function showAddNoteModal() {
            editingNoteId = null;
            document.getElementById('modal-title').textContent = 'Add Note';
            document.getElementById('noteForm').reset();
            document.getElementById('noteModal').style.display = 'block';
        }
        
        function editNote(noteId) {
            editingNoteId = noteId;
            const note = allNotes.find(n => n.id === noteId);
            if (!note) return;
            
            document.getElementById('modal-title').textContent = 'Edit Note';
            document.getElementById('category').value = note.category;
            document.getElementById('title').value = note.title;
            document.getElementById('text').value = note.text;
            document.getElementById('priority').value = note.priority || 'normal';
            document.getElementById('noteModal').style.display = 'block';
        }
        
        async function deleteNote(noteId) {
            if (!confirm('Delete this note?')) return;
            await db.collection('trips').doc(activeTripId).collection('notes').doc(noteId).delete();
            await loadNotes();
        }
        
        function closeModal() {
            document.getElementById('noteModal').style.display = 'none';
        }
        
        document.getElementById('noteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const noteData = {
                category: document.getElementById('category').value,
                title: document.getElementById('title').value,
                text: document.getElementById('text').value,
                priority: document.getElementById('priority').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            if (editingNoteId) {
                await db.collection('trips').doc(activeTripId).collection('notes').doc(editingNoteId).update(noteData);
            } else {
                await db.collection('trips').doc(activeTripId).collection('notes').add(noteData);
            }
            
            closeModal();
            await loadNotes();
        });
    </script>
</body>
</html>
