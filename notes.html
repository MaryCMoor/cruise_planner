<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#a8edea">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Notes - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 1.8em; }
        .container { padding: 15px; }
        .add-note-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .add-note-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        input, select, textarea {
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 10px;
            font-size: 1em;
            width: 100%;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }
        .btn-add {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #2c3e50;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .notes-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .notes-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .note-item {
            background: #fffbea;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #f39c12;
            position: relative;
        }
        .note-item.general { background: #e8f5e9; border-left-color: #27ae60; }
        .note-item.excursion { background: #e3f2fd; border-left-color: #3498db; }
        .note-item.dining { background: #fff3e0; border-left-color: #e67e22; }
        .note-item.important { background: #ffebee; border-left-color: #e74c3c; }
        .note-badges {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            color: white;
        }
        .badge.general { background: #27ae60; }
        .badge.excursion { background: #3498db; }
        .badge.dining { background: #e67e22; }
        .badge.important { background: #e74c3c; }
        .badge.high { background: #e74c3c; }
        .badge.medium { background: #f39c12; }
        .badge.low { background: #95a5a6; }
        .note-title {
            font-weight: 700;
            color: #2c3e50;
            font-size: 1.1em;
            margin-bottom: 8px;
            padding-right: 40px;
        }
        .note-text {
            color: #5a6c7d;
            font-size: 0.95em;
            line-height: 1.5;
        }
        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            font-weight: 600;
            padding: 8px 12px;
            min-width: 60px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.8em; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 Trip Notes</h1>
    </div>

    <div class="container">
        <div class="add-note-card">
            <div class="add-note-header">➕ Add Note</div>
            <input type="text" id="note-title" placeholder="Note title" style="margin-bottom: 10px;">
            <textarea id="note-text" placeholder="Write your note here..."></textarea>
            <div class="form-row">
                <select id="note-category">
                    <option value="general">General</option>
                    <option value="excursion">Excursion</option>
                    <option value="dining">Dining</option>
                    <option value="important">Important</option>
                </select>
                <select id="note-priority">
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
            </div>
            <button class="btn-add" onclick="addNote()">Save Note</button>
        </div>

        <div class="notes-card">
            <div class="notes-header">📌 My Notes</div>
            <div id="notes-list"></div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="packing.html" class="nav-item">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
        <a href="settings.html" class="nav-item">
            <div class="nav-item-icon">⚙️</div>
            <div>Settings</div>
        </a>
    </nav>


    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Enable offline persistence
        db.enablePersistence({ synchronizeTabs: true })
          .catch((err) => {
            console.log('Offline persistence:', err.code);
          });
        
        let currentUser = null;
        
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                loadNotes();
            }
        });
        
        async function loadNotes() {
            const snapshot = await db.collection('users').doc(currentUser.uid)
                .collection('notes').orderBy('createdAt', 'desc').get();
            
            const notes = [];
            snapshot.forEach(doc => {
                notes.push({id: doc.id, ...doc.data()});
            });
            
            const listContainer = document.getElementById('notes-list');
            
            if (notes.length === 0) {
                listContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #7f8c8d;">No notes yet. Add your first note above!</div>';
            } else {
                listContainer.innerHTML = notes.map(note => `
                    <div class="note-item ${note.category}">
                        <button class="btn-delete" onclick="deleteNote('${note.id}')">🗑️</button>
                        <div class="note-badges">
                            <span class="badge ${note.category}">${note.category}</span>
                            <span class="badge ${note.priority}">${note.priority}</span>
                        </div>
                        <div class="note-title">${note.title}</div>
                        <div class="note-text">${note.text}</div>
                    </div>
                `).join('');
            }
        }
        
        async function addNote() {
            const title = document.getElementById('note-title').value;
            const text = document.getElementById('note-text').value;
            const category = document.getElementById('note-category').value;
            const priority = document.getElementById('note-priority').value;
            
            if (!title || !text) {
                alert('Please enter title and note text');
                return;
            }
            
            await db.collection('users').doc(currentUser.uid).collection('notes').add({
                title: title,
                text: text,
                category: category,
                priority: priority,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('note-title').value = '';
            document.getElementById('note-text').value = '';
            document.getElementById('note-category').value = 'general';
            document.getElementById('note-priority').value = 'low';
            
            loadNotes();
        }
        
        async function deleteNote(noteId) {
            if (confirm('Delete this note?')) {
                await db.collection('users').doc(currentUser.uid)
                    .collection('notes').doc(noteId).delete();
                loadNotes();
            }
        }
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then((reg) => console.log('✅ Service Worker registered'))
                .catch((err) => console.log('❌ Service Worker failed:', err));
        });
    }
    </script>
</body>
</html>
