<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Daily Schedule - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 30px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 2.2em; margin-bottom: 5px; }
        .header p { opacity: 0.9; }
        .container { padding: 15px; }
        .day-selector {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .day-selector label {
            display: block;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .day-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            background: white;
        }
        .day-info-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .day-info-title {
            font-size: 1.8em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .day-info-date {
            font-size: 1em;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        .day-info-location {
            font-size: 1.2em;
            color: #11998e;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .port-info {
            background: #e8f8f5;
            padding: 15px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.9em;
        }
        .port-info-item {
            display: flex;
            flex-direction: column;
        }
        .port-info-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 3px;
        }
        .port-info-value {
            color: #555;
        }
        .timeline {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }
        .timeline-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        .timeline-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
        }
        .timeline-item:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 26px;
            top: 50px;
            width: 2px;
            height: calc(100% - 30px);
            background: #e0e0e0;
        }
        .timeline-time {
            min-width: 80px;
            font-weight: 700;
            color: #11998e;
            font-size: 1em;
            padding-top: 5px;
        }
        .timeline-content {
            flex: 1;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #11998e;
            position: relative;
        }
        .timeline-content.excursion { border-left-color: #e74c3c; background: #fef5f5; }
        .timeline-content.backup { border-left-color: #95a5a6; opacity: 0.7; }
        .timeline-content.dining { border-left-color: #f39c12; background: #fef9f3; }
        .timeline-content.onboard { border-left-color: #9b59b6; background: #f9f5fc; }
        .activity-name {
            font-weight: 700;
            color: #2c3e50;
            font-size: 1.1em;
            margin-bottom: 8px;
        }
        .activity-details {
            font-size: 0.9em;
            color: #555;
            margin-bottom: 8px;
        }
        .activity-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .badge {
            font-size: 0.75em;
            padding: 4px 8px;
            border-radius: 5px;
            font-weight: 600;
        }
        .badge-cost {
            background: #d4edda;
            color: #155724;
        }
        .badge-backup {
            background: #fff3cd;
            color: #856404;
        }
        .badge-cancel {
            background: #f8d7da;
            color: #721c24;
        }
        .no-activities {
            text-align: center;
            padding: 40px 20px;
            color: #7f8c8d;
            font-style: italic;
        }
        .no-activities-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.6em;
            font-weight: 600;
            padding: 8px 6px;
            min-width: 48px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.6em; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗓️ Daily Schedule</h1>
        <p>Timeline view by day</p>
    </div>

    <div class="container">
        <div class="day-selector">
            <label>Select Day:</label>
            <select id="daySelect" onchange="loadDaySchedule()"></select>
        </div>

        <div id="day-info-container"></div>
        <div id="schedule-container"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="schedule.html" class="nav-item active">
            <div class="nav-item-icon">🗓️</div>
            <div>Days</div>
        </a>
        <a href="packing.html" class="nav-item">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
        <a href="journal.html" class="nav-item">
            <div class="nav-item-icon">📔</div>
            <div>Journal</div>
        </a>
        <a href="settings.html" class="nav-item">
            <div class="nav-item-icon">⚙️</div>
            <div>Set</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        db.enablePersistence({ synchronizeTabs: true }).catch((err) => console.log('Offline:', err.code));
        
        let currentUser = null;
        let activeTripId = null;
        let allActivities = [];
        
        const cruiseDays = [
            {day: 1, date: '2026-04-19', location: 'New York, USA', type: 'departure'},
            {day: 2, date: '2026-04-20', location: 'At Sea', type: 'sea'},
            {day: 3, date: '2026-04-21', location: 'Halifax, Canada', type: 'port', arrival: '9:00 AM', allAboard: '6:30 PM', departure: '7:00 PM'},
            {day: 4, date: '2026-04-22', location: 'At Sea', type: 'sea'},
            {day: 5, date: '2026-04-23', location: 'At Sea', type: 'sea'},
            {day: 6, date: '2026-04-24', location: 'At Sea', type: 'sea'},
            {day: 7, date: '2026-04-25', location: 'At Sea', type: 'sea'},
            {day: 8, date: '2026-04-26', location: 'Ponta Delgada, Azores (Portugal)', type: 'port', arrival: '8:00 AM', allAboard: '5:30 PM', departure: '6:00 PM'},
            {day: 9, date: '2026-04-27', location: 'Ponta Delgada, Azores (Portugal)', type: 'port', arrival: 'In Port', allAboard: '7:00 PM', departure: '7:30 PM'},
            {day: 10, date: '2026-04-28', location: 'At Sea', type: 'sea'},
            {day: 11, date: '2026-04-29', location: 'Lisbon (Cascais), Portugal', type: 'port', arrival: '7:00 AM', allAboard: '7:00 PM', departure: '7:30 PM'},
            {day: 12, date: '2026-04-30', location: 'At Sea', type: 'sea'},
            {day: 13, date: '2026-05-01', location: 'Cadiz (Seville), Spain', type: 'port', arrival: '7:00 AM', allAboard: '5:00 PM', departure: '5:30 PM'},
            {day: 14, date: '2026-05-02', location: 'Malaga (Granada), Spain', type: 'port', arrival: '11:00 AM', allAboard: '7:00 PM', departure: '7:30 PM'},
            {day: 15, date: '2026-05-03', location: 'At Sea', type: 'sea'},
            {day: 16, date: '2026-05-04', location: 'Marseille (Provence), France', type: 'port', arrival: '8:00 AM', allAboard: '6:00 PM', departure: '6:30 PM'},
            {day: 17, date: '2026-05-05', location: 'Barcelona, Spain', type: 'arrival', arrival: '7:00 AM', allAboard: 'N/A', departure: 'Disembark'},
            {day: 18, date: '2026-05-06', location: 'Barcelona, Spain (Post-Cruise)', type: 'land'},
            {day: 19, date: '2026-05-07', location: 'Barcelona, Spain (Post-Cruise)', type: 'land'},
            {day: 20, date: '2026-05-08', location: 'Barcelona, Spain (Post-Cruise)', type: 'land'}
        ];
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                activeTripId = localStorage.getItem('activeTripId');
                if (!activeTripId) {
                    alert('No active trip. Go to Settings to create one.');
                    window.location.href = 'settings.html';
                } else {
                    await loadActivities();
                    populateDaySelect();
                    loadDaySchedule();
                }
            }
        });
        
        async function loadActivities() {
            const snapshot = await db.collection('trips').doc(activeTripId).collection('itinerary').get();
            allActivities = [];
            snapshot.forEach(doc => {
                allActivities.push({ id: doc.id, ...doc.data() });
            });
        }
        
        function populateDaySelect() {
            const select = document.getElementById('daySelect');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let defaultDay = 1;
            cruiseDays.forEach(day => {
                const dayDate = new Date(day.date.split('-').join('/'));
                if (dayDate.getTime() === today.getTime()) {
                    defaultDay = day.day;
                }
            });
            
            select.innerHTML = cruiseDays.map(day => 
                `<option value="${day.day}" ${day.day === defaultDay ? 'selected' : ''}>
                    Day ${day.day} - ${day.location}
                </option>`
            ).join('');
        }
        
        function loadDaySchedule() {
            const selectedDay = parseInt(document.getElementById('daySelect').value);
            const dayInfo = cruiseDays.find(d => d.day === selectedDay);
            const dayActivities = allActivities.filter(a => a.day === selectedDay);
            
            let portInfoHTML = '';
            if (dayInfo.type === 'port' || dayInfo.type === 'arrival') {
                portInfoHTML = `
                    <div class="port-info">
                        ${dayInfo.arrival ? `
                            <div class="port-info-item">
                                <div class="port-info-label">🚢 Arrival</div>
                                <div class="port-info-value">${dayInfo.arrival}</div>
                            </div>
                        ` : ''}
                        ${dayInfo.allAboard && dayInfo.allAboard !== 'N/A' ? `
                            <div class="port-info-item">
                                <div class="port-info-label">⏰ All Aboard</div>
                                <div class="port-info-value">${dayInfo.allAboard}</div>
                            </div>
                        ` : ''}
                        ${dayInfo.departure && dayInfo.departure !== 'Disembark' ? `
                            <div class="port-info-item">
                                <div class="port-info-label">⚓ Departure</div>
                                <div class="port-info-value">${dayInfo.departure}</div>
                            </div>
                        ` : ''}
                        ${dayInfo.departure === 'Disembark' ? `
                            <div class="port-info-item">
                                <div class="port-info-label">🏁 Disembark</div>
                                <div class="port-info-value">End of Cruise</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            document.getElementById('day-info-container').innerHTML = `
                <div class="day-info-card">
                    <div class="day-info-title">Day ${dayInfo.day}</div>
                    <div class="day-info-date">${formatDate(dayInfo.date)}</div>
                    <div class="day-info-location">${dayInfo.location}</div>
                    ${portInfoHTML}
                </div>
            `;
            
            if (dayActivities.length === 0) {
                document.getElementById('schedule-container').innerHTML = `
                    <div class="timeline">
                        <div class="no-activities">
                            <div class="no-activities-icon">📅</div>
                            <div>No activities scheduled for this day</div>
                        </div>
                    </div>
                `;
            } else {
                dayActivities.sort((a, b) => {
                    if (!a.timeStart && !b.timeStart) return 0;
                    if (!a.timeStart) return 1;
                    if (!b.timeStart) return -1;
                    return a.timeStart.localeCompare(b.timeStart);
                });
                
                let timelineHTML = '<div class="timeline"><div class="timeline-header">Daily Timeline</div>';
                
                dayActivities.forEach(activity => {
                    const badges = [];
                    if (activity.cost > 0) badges.push(`<span class="badge badge-cost">$${activity.cost}</span>`);
                    if (activity.priority === 'backup') badges.push(`<span class="badge badge-backup">BACKUP</span>`);
                    if (activity.cancelDate) {
                        const cancelBy = new Date(activity.cancelDate);
                        const today = new Date();
                        if (cancelBy < today) {
                            badges.push(`<span class="badge badge-cancel">Cancel by ${formatDate(activity.cancelDate)}</span>`);
                        }
                    }
                    
                    const timeDisplay = activity.timeStart && activity.timeEnd 
                        ? `${activity.timeStart}<br><small style="font-weight:400;color:#7f8c8d;">to</small><br>${activity.timeEnd}`
                        : activity.timeStart 
                        ? activity.timeStart 
                        : 'All Day';
                    
                    const priorityClass = activity.priority === 'backup' ? 'backup' : '';
                    
                    timelineHTML += `
                        <div class="timeline-item">
                            <div class="timeline-time">${timeDisplay}</div>
                            <div class="timeline-content ${activity.activityType} ${priorityClass}">
                                <div class="activity-name">${activity.name}</div>
                                ${activity.details ? `<div class="activity-details">${activity.details}</div>` : ''}
                                ${badges.length > 0 ? `<div class="activity-badges">${badges.join('')}</div>` : ''}
                                ${activity.bookingLink ? `<div style="margin-top: 10px;"><a href="${activity.bookingLink}" target="_blank" style="color: #11998e; text-decoration: none; font-weight: 600;">🔗 View Booking</a></div>` : ''}
                            </div>
                        </div>
                    `;
                });
                
                timelineHTML += '</div>';
                document.getElementById('schedule-container').innerHTML = timelineHTML;
            }
        }
        
        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            const date = new Date(year, month - 1, day);
            return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }
    </script>
</body>
</html>
