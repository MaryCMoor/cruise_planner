<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#00d2ff">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Schedule - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 1.8em; }
        .container { padding: 15px; }
        .date-selector {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .date-selector label {
            display: block;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .date-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            color: #2c3e50;
        }
        .schedule-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .schedule-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .schedule-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #3498db;
            position: relative;
        }
        .schedule-item.meal { border-left-color: #e67e22; }
        .schedule-item.activity { border-left-color: #9b59b6; }
        .schedule-item.entertainment { border-left-color: #e74c3c; }
        .schedule-item.excursion { border-left-color: #27ae60; }
        .schedule-time {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .schedule-title {
            font-size: 1.1em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .schedule-details {
            color: #7f8c8d;
            font-size: 0.9em;
        }
        .schedule-type {
            display: inline-block;
            background: #95a5a6;
            color: white;
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 8px;
        }
        .schedule-type.meal { background: #e67e22; }
        .schedule-type.activity { background: #9b59b6; }
        .schedule-type.entertainment { background: #e74c3c; }
        .schedule-type.excursion { background: #27ae60; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7f8c8d;
        }
        .empty-state-icon { font-size: 4em; margin-bottom: 15px; }
        .empty-state-text { font-size: 1.1em; }
        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            font-weight: 600;
            padding: 8px 12px;
            min-width: 60px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.8em; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗓️ Daily Schedule</h1>
    </div>

    <div class="container">
        <div class="date-selector">
            <label>Select Day</label>
            <select id="day-selector" onchange="loadSchedule()">
                <option value="1">Day 1 - New York, USA</option>
                <option value="2">Day 2 - At Sea</option>
                <option value="3">Day 3 - Halifax, Canada</option>
                <option value="4">Day 4 - At Sea</option>
                <option value="5">Day 5 - At Sea</option>
                <option value="6">Day 6 - At Sea</option>
                <option value="7">Day 7 - At Sea</option>
                <option value="8">Day 8 - Ponta Delgada, Azores</option>
                <option value="9">Day 9 - Ponta Delgada, Azores</option>
                <option value="10">Day 10 - At Sea</option>
                <option value="11">Day 11 - Lisbon, Portugal</option>
                <option value="12">Day 12 - At Sea</option>
                <option value="13">Day 13 - Cadiz, Spain</option>
                <option value="14">Day 14 - Malaga, Spain</option>
                <option value="15">Day 15 - At Sea</option>
                <option value="16">Day 16 - Marseille, France</option>
                <option value="17">Day 17 - Barcelona, Spain</option>
                <option value="18">Day 18 - Barcelona (Post-Cruise)</option>
                <option value="19">Day 19 - Barcelona (Post-Cruise)</option>
                <option value="20">Day 20 - Barcelona (Departure)</option>
            </select>
        </div>

        <div id="schedule-container"></div>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="schedule.html" class="nav-item active">
            <div class="nav-item-icon">🗓️</div>
            <div>Days</div>
        </a>
        <a href="packing.html" class="nav-item">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Enable offline persistence
        db.enablePersistence({ synchronizeTabs: true })
          .catch((err) => {
            console.log('Offline persistence:', err.code);
          });
        
        let currentUser = null;
        
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                loadSchedule();
            }
        });
        
        async function loadSchedule() {
            const selectedDay = parseInt(document.getElementById('day-selector').value);
            const container = document.getElementById('schedule-container');
            
            const snapshot = await db.collection('users').doc(currentUser.uid)
                .collection('itinerary')
                .where('day', '==', selectedDay)
                .get();
            
            const items = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.time) {
                    items.push({id: doc.id, ...data});
                }
            });
            
            items.sort((a, b) => a.time.localeCompare(b.time));
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="schedule-card">
                        <div class="empty-state">
                            <div class="empty-state-icon">📅</div>
                            <div class="empty-state-text">No scheduled activities for this day</div>
                            <div style="margin-top: 10px; color: #95a5a6; font-size: 0.9em;">
                                Add activities with times in the Trip page
                            </div>
                        </div>
                    </div>
                `;
            } else {
                let html = '<div class="schedule-card"><div class="schedule-header">Today\'s Schedule</div>';
                
                items.forEach(item => {
                    const typeClass = item.activityType || 'other';
                    html += `
                        <div class="schedule-item ${typeClass}">
                            <button class="btn-delete" onclick="deleteItem('${item.id}')">🗑️</button>
                            <div class="schedule-time">${formatTime(item.time)}</div>
                            <div class="schedule-title">${item.name}</div>
                            ${item.details ? `<div class="schedule-details">${item.details}</div>` : ''}
                            <div class="schedule-type ${typeClass}">${item.activityType || 'other'}</div>
                        </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
            }
        }
        
        function formatTime(time) {
            if (!time) return '';
            const [hours, minutes] = time.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const hour12 = hour % 12 || 12;
            return `${hour12}:${minutes} ${ampm}`;
        }
        
        async function deleteItem(itemId) {
            if (confirm('Remove this from schedule?')) {
                await db.collection('users').doc(currentUser.uid)
                    .collection('itinerary').doc(itemId).delete();
                loadSchedule();
            }
        }
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then((reg) => console.log('✅ Service Worker registered'))
                .catch((err) => console.log('❌ Service Worker failed:', err));
        });
    }
    </script>
</body>
</html>
