<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Schedule - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 1.8em; }
        .container { padding: 15px; }
        .day-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .day-btn {
            padding: 12px 8px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9em;
        }
        .day-btn.active {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-color: #a8edea;
            color: white;
        }
        .current-day-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        .current-day-card h2 { color: #2c3e50; margin-bottom: 5px; }
        .current-day-card .date { color: #7f8c8d; }
        .add-event-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .add-event-card h3 { margin-bottom: 15px; color: #2c3e50; }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #2c3e50;
            font-size: 0.9em;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            font-size: 1em;
        }
        .btn-add {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .events-list {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .events-list h3 { margin-bottom: 15px; color: #2c3e50; }
        .event-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #a8edea;
        }
        .event-item.from-itinerary {
            border-left-color: #fa709a;
            background: #fff5f8;
        }
        .event-source {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: 700;
            margin-bottom: 5px;
            background: #fa709a;
            color: white;
        }
        .event-time { font-weight: 700; color: #2c3e50; }
        .event-title { font-weight: 600; color: #34495e; margin: 5px 0; }
        .event-desc { color: #7f8c8d; font-size: 0.9em; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            font-weight: 600;
            padding: 8px 12px;
            min-width: 60px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.8em; margin-bottom: 4px; }
        .no-events {
            text-align: center;
            color: #999;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗓️ Daily Schedule</h1>
    </div>

    <div class="container">
        <div class="day-selector" id="day-selector"></div>
        
        <div class="current-day-card">
            <h2 id="current-day-title">Day 1</h2>
            <div class="date" id="current-day-date">April 19, 2026</div>
        </div>
        
        <div class="add-event-card">
            <h3>Add Event</h3>
            <div class="form-group">
                <label>Time</label>
                <input type="time" id="event-time">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="event-type">
                    <option value="meal">Meal</option>
                    <option value="activity">Activity</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="port">Port</option>
                </select>
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="event-title" placeholder="Dinner reservation">
            </div>
            <div class="form-group">
                <label>Description (optional)</label>
                <textarea id="event-desc" rows="2" placeholder="Additional details..."></textarea>
            </div>
            <button class="btn-add" onclick="addEvent()">+ Add Event</button>
        </div>
        
        <div class="events-list">
            <h3>Events for This Day</h3>
            <div id="events-container">
                <div class="no-events">No events scheduled yet</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="schedule.html" class="nav-item active">
            <div class="nav-item-icon">🗓️</div>
            <div>Days</div>
        </a>
        <a href="packing.html" class="nav-item">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUser = null;
        let selectedDay = 1;
        
        const cruiseDates = {
            1: '2026-04-19', 2: '2026-04-20', 3: '2026-04-21', 4: '2026-04-22',
            5: '2026-04-23', 6: '2026-04-24', 7: '2026-04-25', 8: '2026-04-26',
            9: '2026-04-27', 10: '2026-04-28', 11: '2026-04-29', 12: '2026-04-30',
            13: '2026-05-01', 14: '2026-05-02', 15: '2026-05-03', 16: '2026-05-04',
            17: '2026-05-05', 18: '2026-05-06', 19: '2026-05-07', 20: '2026-05-08'
        };
        
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                initDaySelector();
                selectDay(1);
            }
        });
        
        function initDaySelector() {
            const selector = document.getElementById('day-selector');
            for (let i = 1; i <= 20; i++) {
                const btn = document.createElement('button');
                btn.className = 'day-btn';
                btn.textContent = `D${i}`;
                btn.onclick = () => selectDay(i);
                selector.appendChild(btn);
            }
        }
        
        function selectDay(day) {
            selectedDay = day;
            document.querySelectorAll('.day-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === day - 1);
            });
            
            document.getElementById('current-day-title').textContent = `Day ${day}`;
            const date = new Date(cruiseDates[day]);
            document.getElementById('current-day-date').textContent = date.toLocaleDateString('en-US', { 
                weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' 
            });
            
            loadEvents(day);
        }
        
        async function loadEvents(day) {
            const container = document.getElementById('events-container');
            
            // Get schedule events
            const scheduleSnapshot = await db.collection('users').doc(currentUser.uid)
                .collection('schedule').where('day', '==', day).get();
            
            // Get itinerary activities with time
            const itinerarySnapshot = await db.collection('users').doc(currentUser.uid)
                .collection('itinerary').where('day', '==', day).get();
            
            const allEvents = [];
            
            // Add schedule events
            scheduleSnapshot.forEach(doc => {
                const event = doc.data();
                allEvents.push({
                    time: event.time,
                    title: event.title,
                    description: event.description,
                    source: 'schedule'
                });
            });
            
            // Add itinerary activities (only if they have a time)
            itinerarySnapshot.forEach(doc => {
                const activity = doc.data();
                if (activity.time) {
                    allEvents.push({
                        time: activity.time,
                        title: activity.name,
                        description: activity.details,
                        source: 'itinerary'
                    });
                }
            });
            
            // Sort by time
            allEvents.sort((a, b) => a.time.localeCompare(b.time));
            
            if (allEvents.length === 0) {
                container.innerHTML = '<div class="no-events">No events scheduled yet</div>';
                return;
            }
            
            container.innerHTML = '';
            allEvents.forEach(event => {
                const eventDiv = document.createElement('div');
                eventDiv.className = `event-item ${event.source === 'itinerary' ? 'from-itinerary' : ''}`;
                eventDiv.innerHTML = `
                    ${event.source === 'itinerary' ? '<span class="event-source">FROM TRIP</span>' : ''}
                    <div class="event-time">${formatTime(event.time)}</div>
                    <div class="event-title">${event.title}</div>
                    ${event.description ? `<div class="event-desc">${event.description}</div>` : ''}
                `;
                container.appendChild(eventDiv);
            });
        }
        
        function formatTime(time) {
            if (!time) return '';
            const [hours, minutes] = time.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const hour12 = hour % 12 || 12;
            return `${hour12}:${minutes} ${ampm}`;
        }
        
        async function addEvent() {
            const time = document.getElementById('event-time').value;
            const type = document.getElementById('event-type').value;
            const title = document.getElementById('event-title').value;
            const description = document.getElementById('event-desc').value;
            
            if (!time || !title) {
                alert('Please fill in time and title');
                return;
            }
            
            await db.collection('users').doc(currentUser.uid).collection('schedule').add({
                day: selectedDay,
                time: time,
                type: type,
                title: title,
                description: description,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('event-time').value = '';
            document.getElementById('event-title').value = '';
            document.getElementById('event-desc').value = '';
            
            loadEvents(selectedDay);
        }
    </script>
</body>
</html>
