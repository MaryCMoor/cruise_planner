<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Login - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }
        .logo-text {
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 10px;
        }
        .btn-google {
            background: white;
            color: #2c3e50;
            border: 2px solid #dcdde1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #7f8c8d;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #dcdde1;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }
        .toggle-link {
            color: #667eea;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .error-message.show { display: block; }
        #signup-form { display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🚢</div>
            <div class="logo-text">Cruise Planner</div>
        </div>
        <div class="subtitle">Plan together, travel better</div>

        <div class="error-message" id="error-message"></div>

        <!-- Login Form -->
        <div id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="loginWithEmail()">Login</button>
            <div class="divider">OR</div>
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <span>🔐</span>
                <span>Continue with Google</span>
            </button>
            <div class="toggle-text">
                Don't have an account? <a class="toggle-link" onclick="showSignup()">Sign Up</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signup-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="signup-name" placeholder="Your name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="signupWithEmail()">Create Account</button>
            <div class="divider">OR</div>
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <span>🔐</span>
                <span>Continue with Google</span>
            </button>
            <div class="toggle-text">
                Already have an account? <a class="toggle-link" onclick="showLogin()">Login</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                await createUserDocument(user);
                window.location.href = 'index.html';
            }
        });
        
        function showError(message) {
            const el = document.getElementById('error-message');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        
        function showSignup() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }
        
        async function createUserDocument(user, name = null) {
            try {
                // Use set with merge to create or update
                await db.collection('users').doc(user.uid).set({
                    email: user.email.toLowerCase(),
                    name: name || user.displayName || '',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    trips: [],
                    activeTrip: null
                }, { merge: true });
                
                console.log('✅ User document created/updated');
            } catch (error) {
                console.error('Error creating user doc:', error);
            }
        }
        
        async function loginWithEmail() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }
            
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                await createUserDocument(result.user);
            } catch (error) {
                showError(error.message);
            }
        }
        
        async function signupWithEmail() {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            
            if (!name) {
                showError('Please enter your name');
                return;
            }
            
            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                await createUserDocument(result.user, name);
            } catch (error) {
                showError(error.message);
            }
        }
        
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            try {
                const result = await auth.signInWithPopup(provider);
                await createUserDocument(result.user);
            } catch (error) {
                showError(error.message);
            }
        }
        
        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const loginForm = document.getElementById('login-form');
                if (loginForm.style.display !== 'none') {
                    loginWithEmail();
                } else {
                    signupWithEmail();
                }
            }
        });
    </script>
</body>
</html>
