<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Trip Setup - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 1.8em; }
        .container { padding: 15px; }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .card-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 10px;
            font-size: 1em;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-secondary {
            background: #95a5a6;
        }
        .trip-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .trip-card:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }
        .trip-card.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .trip-name {
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .trip-dates {
            font-size: 0.9em;
            opacity: 0.8;
        }
        .trip-members {
            font-size: 0.85em;
            margin-top: 5px;
        }
        .member-list {
            margin-top: 15px;
        }
        .member-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg.show { display: block; }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .error-msg.show { display: block; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            font-weight: 600;
            padding: 8px 12px;
            min-width: 60px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.8em; margin-bottom: 4px; }
        .current-trip-banner {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚢 Trip Setup</h1>
    </div>

    <div class="container">
        <div id="current-trip-display"></div>

        <div class="success-msg" id="success-msg"></div>
        <div class="error-msg" id="error-msg"></div>

        <!-- Create New Trip -->
        <div class="card" id="create-trip-card">
            <div class="card-header">✨ Create New Trip</div>
            <div class="info-box">
                Create a trip and invite your travel partner to collaborate on itinerary, packing list, and more!
            </div>
            <div class="form-group">
                <label>Trip Name</label>
                <input type="text" id="trip-name" placeholder="MSC Mediterranean Cruise 2026">
            </div>
            <div class="form-group">
                <label>Start Date</label>
                <input type="date" id="trip-start" value="2026-04-19">
            </div>
            <div class="form-group">
                <label>End Date</label>
                <input type="date" id="trip-end" value="2026-05-08">
            </div>
            <button class="btn" onclick="createTrip()">Create Trip</button>
        </div>

        <!-- My Trips -->
        <div class="card">
            <div class="card-header">🗺️ My Trips</div>
            <div id="trips-list"></div>
        </div>

        <!-- Invite Partner (only shows when trip is active) -->
        <div class="card" id="invite-card" style="display: none;">
            <div class="card-header">🤝 Invite Travel Partner</div>
            <div class="info-box">
                Your partner will be able to add/edit/view all trip data together with you!
            </div>
            <div class="form-group">
                <label>Partner's Email</label>
                <input type="email" id="partner-email" placeholder="partner@example.com">
            </div>
            <button class="btn" onclick="invitePartner()">Send Invitation</button>
            
            <div class="member-list" id="members-list"></div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="packing.html" class="nav-item">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
        <a href="settings.html" class="nav-item active">
            <div class="nav-item-icon">⚙️</div>
            <div>Settings</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        db.enablePersistence({ synchronizeTabs: true })
          .catch((err) => console.log('Offline persistence:', err.code));
        
        let currentUser = null;
        let activeTrip = null;
        
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                loadUserTrips();
            }
        });
        
        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        
        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        
        async function createTrip() {
            const name = document.getElementById('trip-name').value.trim();
            const startDate = document.getElementById('trip-start').value;
            const endDate = document.getElementById('trip-end').value;
            
            if (!name) {
                showError('Please enter trip name');
                return;
            }
            
            try {
                const tripRef = await db.collection('trips').add({
                    name: name,
                    startDate: startDate,
                    endDate: endDate,
                    createdBy: currentUser.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    members: [currentUser.uid]
                });
                
                // Use SET with merge instead of UPDATE to handle missing doc
                await db.collection('users').doc(currentUser.uid).set({
                    email: currentUser.email.toLowerCase(),
                    name: currentUser.displayName || '',
                    trips: firebase.firestore.FieldValue.arrayUnion(tripRef.id),
                    activeTrip: tripRef.id,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                
                localStorage.setItem('activeTripId', tripRef.id);
                
                showSuccess('✅ Trip created successfully!');
                document.getElementById('trip-name').value = '';
                loadUserTrips();
                
            } catch (error) {
                showError('Error creating trip: ' + error.message);
            }
        }


        
        async function loadUserTrips() {
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const userData = userDoc.data() || {};
            const tripIds = userData.trips || [];
            
            activeTrip = localStorage.getItem('activeTripId') || userData.activeTrip;
            
            if (tripIds.length === 0) {
                document.getElementById('trips-list').innerHTML = `
                    <div style="color: #7f8c8d; text-align: center; padding: 20px;">
                        No trips yet. Create your first trip above!
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (const tripId of tripIds) {
                const tripDoc = await db.collection('trips').doc(tripId).get();
                if (tripDoc.exists) {
                    const trip = tripDoc.data();
                    const isActive = tripId === activeTrip;
                    
                    html += `
                        <div class="trip-card ${isActive ? 'active' : ''}" onclick="selectTrip('${tripId}')">
                            <div class="trip-name">${trip.name}</div>
                            <div class="trip-dates">${trip.startDate} to ${trip.endDate}</div>
                            <div class="trip-members">👥 ${trip.members.length} member(s)</div>
                            ${isActive ? '<div style="margin-top: 5px;">✅ Active Trip</div>' : ''}
                        </div>
                    `;
                }
            }
            
            document.getElementById('trips-list').innerHTML = html;
            
            if (activeTrip) {
                displayCurrentTrip();
                document.getElementById('invite-card').style.display = 'block';
                loadTripMembers();
            }
        }
        
        async function displayCurrentTrip() {
            const tripDoc = await db.collection('trips').doc(activeTrip).get();
            if (tripDoc.exists) {
                const trip = tripDoc.data();
                document.getElementById('current-trip-display').innerHTML = `
                    <div class="current-trip-banner">
                        ✈️ Active Trip: ${trip.name}
                    </div>
                `;
            }
        }
        
        async function selectTrip(tripId) {
            localStorage.setItem('activeTripId', tripId);
            
            await db.collection('users').doc(currentUser.uid).update({
                activeTrip: tripId
            });
            
            showSuccess('✅ Trip activated!');
            loadUserTrips();
        }
        
        async function invitePartner() {
            const email = document.getElementById('partner-email').value.trim().toLowerCase();
            
            if (!email) {
                showError('Please enter email');
                return;
            }
            
            if (email === currentUser.email.toLowerCase()) {
                showError("Can't invite yourself!");
                return;
            }
            
            try {
                const usersSnapshot = await db.collection('users')
                    .where('email', '==', email).get();
                
                if (usersSnapshot.empty) {
                    showError(`User not found: ${email}. They need to create an account first.`);
                    return;
                }
                
                const partnerId = usersSnapshot.docs[0].id;
                
                const tripDoc = await db.collection('trips').doc(activeTrip).get();
                const trip = tripDoc.data();
                
                if (trip.members.includes(partnerId)) {
                    showError('User already a member of this trip!');
                    return;
                }
                
                await db.collection('trips').doc(activeTrip).update({
                    members: firebase.firestore.FieldValue.arrayUnion(partnerId)
                });
                
                await db.collection('users').doc(partnerId).update({
                    trips: firebase.firestore.FieldValue.arrayUnion(activeTrip)
                });
                
                showSuccess(`✅ Successfully invited ${email}!`);
                document.getElementById('partner-email').value = '';
                loadTripMembers();
                
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }
        
        async function loadTripMembers() {
            const tripDoc = await db.collection('trips').doc(activeTrip).get();
            const trip = tripDoc.data();
            
            let html = '<div style="margin-top: 20px;"><strong>Trip Members:</strong></div>';
            
            for (const memberId of trip.members) {
                const userDoc = await db.collection('users').doc(memberId).get();
                const user = userDoc.data();
                
                html += `
                    <div class="member-item">
                        <div>
                            <strong>${user.name || 'User'}</strong><br>
                            <small>${user.email}</small>
                        </div>
                        ${memberId === trip.createdBy ? '<span style="color: #27ae60;">👑 Owner</span>' : ''}
                    </div>
                `;
            }
            
            document.getElementById('members-list').innerHTML = html;
        }
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then((reg) => console.log('✅ Service Worker registered'))
                .catch((err) => console.log('❌ Service Worker failed:', err));
        });
    }
    </script>
</body>
</html>
