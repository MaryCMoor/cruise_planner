<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f093fb">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Packing - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 1.8em; }
        .container { padding: 15px; }
        .progress-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        .progress-label {
            font-size: 1.1em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 30px;
            background: #ecf0f1;
            border-radius: 15px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.9em;
        }
        .add-item-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .add-item-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        input, select {
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 10px;
            font-size: 1em;
        }
        .btn-add {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .packing-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .packing-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .packing-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .packing-item.packed {
            background: #d4edda;
        }
        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        .item-content {
            flex: 1;
        }
        .item-name {
            font-weight: 700;
            color: #2c3e50;
            font-size: 1.05em;
        }
        .item-name.packed {
            text-decoration: line-through;
            color: #95a5a6;
        }
        .item-details {
            color: #7f8c8d;
            font-size: 0.85em;
            margin-top: 3px;
        }
        .btn-delete {
            width: 32px;
            height: 32px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            font-weight: 600;
            padding: 8px 12px;
            min-width: 60px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.8em; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧳 Packing List</h1>
    </div>

    <div class="container">
        <div class="progress-card">
            <div class="progress-label" id="progress-label">0 of 0 items packed</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar" style="width: 0%">0%</div>
            </div>
        </div>

        <div class="add-item-card">
            <div class="add-item-header">➕ Add Item</div>
            <div class="form-row">
                <input type="text" id="item-name" placeholder="Item name">
                <input type="number" id="item-quantity" placeholder="Qty" value="1">
            </div>
            <select id="item-house">
                <option value="My House">My House</option>
                <option value="Her House">Her House</option>
                <option value="Buy">Need to Buy</option>
            </select>
            <input type="text" id="item-notes" placeholder="Notes (optional)" style="margin-top: 10px; width: 100%;">
            <button class="btn-add" onclick="addItem()">Add to List</button>
        </div>

        <div class="packing-card">
            <div class="packing-header">📦 My Items</div>
            <div id="packing-list"></div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="schedule.html" class="nav-item">
            <div class="nav-item-icon">🗓️</div>
            <div>Days</div>
        </a>
        <a href="packing.html" class="nav-item active">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Enable offline persistence
        db.enablePersistence({ synchronizeTabs: true })
          .catch((err) => {
            console.log('Offline persistence:', err.code);
          });
        
        let currentUser = null;
        
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                loadPackingList();
            }
        });
        
        async function loadPackingList() {
            const snapshot = await db.collection('users').doc(currentUser.uid)
                .collection('packing').orderBy('createdAt', 'desc').get();
            
            const items = [];
            snapshot.forEach(doc => {
                items.push({id: doc.id, ...doc.data()});
            });
            
            const total = items.length;
            const packed = items.filter(i => i.packed).length;
            const percentage = total > 0 ? Math.round((packed / total) * 100) : 0;
            
            document.getElementById('progress-label').textContent = `${packed} of ${total} items packed`;
            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('progress-bar').textContent = percentage + '%';
            
            const listContainer = document.getElementById('packing-list');
            
            if (items.length === 0) {
                listContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #7f8c8d;">No items yet. Add your first item above!</div>';
            } else {
                listContainer.innerHTML = items.map(item => `
                    <div class="packing-item ${item.packed ? 'packed' : ''}">
                        <input type="checkbox" class="checkbox" ${item.packed ? 'checked' : ''} 
                               onchange="togglePacked('${item.id}', this.checked)">
                        <div class="item-content">
                            <div class="item-name ${item.packed ? 'packed' : ''}">
                                ${item.name} ${item.quantity > 1 ? `(×${item.quantity})` : ''}
                            </div>
                            <div class="item-details">
                                ${item.house}${item.notes ? ` • ${item.notes}` : ''}
                            </div>
                        </div>
                        <button class="btn-delete" onclick="deleteItem('${item.id}')">🗑️</button>
                    </div>
                `).join('');
            }
        }
        
        async function addItem() {
            const name = document.getElementById('item-name').value;
            const quantity = parseInt(document.getElementById('item-quantity').value) || 1;
            const house = document.getElementById('item-house').value;
            const notes = document.getElementById('item-notes').value;
            
            if (!name) {
                alert('Please enter item name');
                return;
            }
            
            await db.collection('users').doc(currentUser.uid).collection('packing').add({
                name: name,
                quantity: quantity,
                house: house,
                notes: notes,
                packed: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('item-name').value = '';
            document.getElementById('item-quantity').value = '1';
            document.getElementById('item-house').value = 'My House';
            document.getElementById('item-notes').value = '';
            
            loadPackingList();
        }
        
        async function togglePacked(itemId, packed) {
            await db.collection('users').doc(currentUser.uid)
                .collection('packing').doc(itemId).update({ packed: packed });
            loadPackingList();
        }
        
        async function deleteItem(itemId) {
            if (confirm('Delete this item?')) {
                await db.collection('users').doc(currentUser.uid)
                    .collection('packing').doc(itemId).delete();
                loadPackingList();
            }
        }
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then((reg) => console.log('✅ Service Worker registered'))
                .catch((err) => console.log('❌ Service Worker failed:', err));
        });
    }
    </script>
</body>
</html>
