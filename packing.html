<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f093fb">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Packing - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 1.8em; }
        .container { padding: 15px; }
        .no-trip-banner {
            background: white;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .no-trip-banner h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .no-trip-banner p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .btn-setup {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .progress-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        .progress-label {
            font-size: 1.1em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 30px;
            background: #ecf0f1;
            border-radius: 15px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.9em;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-print {
            flex: 1;
            padding: 12px;
            background: white;
            color: #2c3e50;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .add-item-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .add-item-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        input, select {
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 10px;
            font-size: 1em;
            width: 100%;
        }
        .btn-add {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .filter-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #dcdde1;
            background: white;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-color: #f093fb;
        }
        .packing-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .packing-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .category-section {
            margin-bottom: 20px;
        }
        .category-title {
            font-size: 1.1em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .packing-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .packing-item.packed {
            background: #d4edda;
        }
        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        .item-content {
            flex: 1;
        }
        .item-name {
            font-weight: 700;
            color: #2c3e50;
            font-size: 1.05em;
        }
        .item-name.packed {
            text-decoration: line-through;
            color: #95a5a6;
        }
        .item-details {
            color: #7f8c8d;
            font-size: 0.85em;
            margin-top: 3px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .item-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge-mary { background: #ffeef8; color: #e91e63; }
        .badge-brian { background: #e3f2fd; color: #2196f3; }
        .badge-house { background: #fff3e0; color: #f57c00; }
        .item-actions {
            display: flex;
            gap: 5px;
        }
        .btn-icon {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-edit {
            background: #3498db;
            color: white;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-secondary { background: #e0e0e0; color: #2c3e50; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            font-weight: 600;
            padding: 8px 12px;
            min-width: 60px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.8em; margin-bottom: 4px; }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .header, .bottom-nav, .action-buttons, .add-item-card, .filter-card, 
            .progress-bar-bg, .item-actions, .btn-icon {
                display: none !important;
            }
            .container {
                padding: 20px;
            }
            .progress-card {
                box-shadow: none;
                border: 2px solid #ddd;
                margin-bottom: 20px;
            }
            .packing-card {
                box-shadow: none;
                border: 1px solid #ddd;
                page-break-inside: avoid;
            }
            .category-section {
                page-break-inside: avoid;
            }
            .category-title {
                background: #f0f0f0;
                border: 1px solid #ddd;
                page-break-after: avoid;
            }
            .packing-item {
                border: 1px solid #e0e0e0;
                page-break-inside: avoid;
            }
            .checkbox {
                border: 2px solid #333;
                appearance: none;
                -webkit-appearance: none;
            }
            .checkbox:checked::after {
                content: "✓";
                display: block;
                text-align: center;
                font-weight: bold;
            }
            .print-header {
                display: block !important;
                text-align: center;
                margin-bottom: 20px;
                padding-bottom: 10px;
                border-bottom: 3px solid #2c3e50;
            }
            .print-header h1 {
                font-size: 2em;
                color: #2c3e50;
                margin-bottom: 5px;
            }
            .print-date {
                color: #7f8c8d;
                font-size: 0.9em;
            }
        }
        .print-header {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧳 Packing List</h1>
    </div>

    <div class="container">
        <div class="print-header">
            <h1>🚢 MSC Cruise Packing List</h1>
            <div class="print-date">April 19 - May 8, 2026</div>
        </div>

        <div id="main-content"></div>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">✏️ Edit Item</div>
            
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" id="edit-name" placeholder="Item name">
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="edit-quantity" placeholder="1">
            </div>

            <div class="form-group">
                <label>Person</label>
                <select id="edit-person">
                    <option value="Mary">Mary</option>
                    <option value="Brian">Brian</option>
                    <option value="Both">Both</option>
                </select>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="edit-category">
                    <option value="Clothes">Clothes</option>
                    <option value="Toiletries">Toiletries</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Documents">Documents</option>
                    <option value="Medications">Medications</option>
                    <option value="Beach">Beach</option>
                    <option value="Formal">Formal Wear</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Location</label>
                <select id="edit-house">
                    <option value="Mary's House">Mary's House</option>
                    <option value="Monty House">Monty House</option>
                    <option value="Buy">Buy</option>
                </select>
            </div>

            <div class="form-group">
                <label>Notes (optional)</label>
                <input type="text" id="edit-notes" placeholder="Notes">
            </div>

            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="packing.html" class="nav-item active">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
        <a href="settings.html" class="nav-item">
            <div class="nav-item-icon">⚙️</div>
            <div>Settings</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        db.enablePersistence({ synchronizeTabs: true })
          .catch((err) => console.log('Offline persistence:', err.code));
        
        let currentUser = null;
        let activeTripId = null;
        let allItems = [];
        let currentFilter = 'All';
        let editingItemId = null;
        
        const categoryIcons = {
            'Clothes': '👕',
            'Toiletries': '🧴',
            'Electronics': '🔌',
            'Documents': '📄',
            'Medications': '💊',
            'Beach': '🏖️',
            'Formal': '👔',
            'Other': '📦'
        };
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                await checkActiveTrip();
            }
        });
        
        async function checkActiveTrip() {
            activeTripId = localStorage.getItem('activeTripId');
            
            if (!activeTripId) {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const userData = userDoc.data();
                activeTripId = userData?.activeTrip;
                if (activeTripId) {
                    localStorage.setItem('activeTripId', activeTripId);
                }
            }
            
            if (!activeTripId) {
                showNoTripMessage();
            } else {
                loadPackingList();
            }
        }
        
        function showNoTripMessage() {
            document.getElementById('main-content').innerHTML = `
                <div class="no-trip-banner">
                    <h2>🚢 No Active Trip</h2>
                    <p>Create a trip in Settings to start packing!</p>
                    <a href="settings.html" class="btn-setup">Go to Settings</a>
                </div>
            `;
        }
        
        async function loadPackingList() {
            const snapshot = await db.collection('trips').doc(activeTripId)
                .collection('packing').orderBy('createdAt', 'desc').get();
            
            allItems = [];
            snapshot.forEach(doc => {
                allItems.push({id: doc.id, ...doc.data()});
            });
            
            displayUI();
        }
        
        function displayUI() {
            const container = document.getElementById('main-content');
            
            const total = allItems.length;
            const packed = allItems.filter(i => i.packed).length;
            const percentage = total > 0 ? Math.round((packed / total) * 100) : 0;
            
            container.innerHTML = `
                <div class="progress-card">
                    <div class="progress-label">${packed} of ${total} items packed</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${percentage}%">${percentage}%</div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-print" onclick="window.print()">
                        🖨️ Print Packing List
                    </button>
                </div>

                <div class="add-item-card">
                    <div class="add-item-header">➕ Add Item</div>
                    <div class="form-row">
                        <input type="text" id="item-name" placeholder="Item name">
                        <input type="number" id="item-quantity" placeholder="Qty" value="1">
                    </div>
                    <div class="form-row-3">
                        <select id="item-person">
                            <option value="Mary">Mary</option>
                            <option value="Brian">Brian</option>
                            <option value="Both">Both</option>
                        </select>
                        <select id="item-category">
                            <option value="Clothes">Clothes</option>
                            <option value="Toiletries">Toiletries</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Documents">Documents</option>
                            <option value="Medications">Medications</option>
                            <option value="Beach">Beach</option>
                            <option value="Formal">Formal Wear</option>
                            <option value="Other">Other</option>
                        </select>
                        <select id="item-house">
                            <option value="Mary's House">Mary's House</option>
                            <option value="Monty House">Monty House</option>
                            <option value="Buy">Buy</option>
                        </select>
                    </div>
                    <input type="text" id="item-notes" placeholder="Notes (optional)" style="width: 100%;">
                    <button class="btn-add" onclick="addItem()">Add to List</button>
                </div>

                <div class="filter-card">
                    <div style="font-weight: 700; margin-bottom: 10px; color: #2c3e50;">Filter by Person:</div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" onclick="filterByPerson('All')">All</button>
                        <button class="filter-btn" onclick="filterByPerson('Mary')">👩 Mary</button>
                        <button class="filter-btn" onclick="filterByPerson('Brian')">👨 Brian</button>
                        <button class="filter-btn" onclick="filterByPerson('Both')">👥 Both</button>
                    </div>
                </div>

                <div class="packing-card" id="packing-container"></div>
            `;
            
            displayItems();
        }
        
        function displayItems() {
            const container = document.getElementById('packing-container');
            
            let filteredItems = allItems;
            if (currentFilter !== 'All') {
                filteredItems = allItems.filter(item => 
                    item.person === currentFilter || item.person === 'Both'
                );
            }
            
            if (filteredItems.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #7f8c8d;">No items yet. Add your first item above!</div>';
                return;
            }
            
            const categories = {};
            filteredItems.forEach(item => {
                const cat = item.category || 'Other';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(item);
            });
            
            let html = '';
            Object.keys(categories).sort().forEach(category => {
                const items = categories[category];
                const icon = categoryIcons[category] || '📦';
                
                html += `
                    <div class="category-section">
                        <div class="category-title">
                            <span>${icon}</span>
                            <span>${category}</span>
                            <span style="margin-left: auto; font-size: 0.9em; color: #7f8c8d;">
                                ${items.filter(i => i.packed).length}/${items.length}
                            </span>
                        </div>
                `;
                
                items.forEach(item => {
                    html += createItemHTML(item);
                });
                
                html += '</div>';
            });
            
            container.innerHTML = html;
        }
        
        function createItemHTML(item) {
            const personClass = item.person === 'Mary' ? 'badge-mary' : 
                               item.person === 'Brian' ? 'badge-brian' : 
                               'badge-house';
            
            return `
                <div class="packing-item ${item.packed ? 'packed' : ''}">
                    <input type="checkbox" class="checkbox" ${item.packed ? 'checked' : ''} 
                           onchange="togglePacked('${item.id}', this.checked)">
                    <div class="item-content">
                        <div class="item-name ${item.packed ? 'packed' : ''}">
                            ${item.name} ${item.quantity > 1 ? `(×${item.quantity})` : ''}
                        </div>
                        <div class="item-details">
                            <span class="item-badge ${personClass}">${item.person}</span>
                            <span class="item-badge badge-house">${item.house}</span>
                            ${item.notes ? `<span>• ${item.notes}</span>` : ''}
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon btn-edit" onclick="openEditModal('${item.id}')">✏️</button>
                        <button class="btn-icon btn-delete" onclick="deleteItem('${item.id}')">🗑️</button>
                    </div>
                </div>
            `;
        }
        
        function filterByPerson(person) {
            currentFilter = person;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            displayItems();
        }
        
        async function addItem() {
            const name = document.getElementById('item-name').value;
            const quantity = parseInt(document.getElementById('item-quantity').value) || 1;
            const person = document.getElementById('item-person').value;
            const category = document.getElementById('item-category').value;
            const house = document.getElementById('item-house').value;
            const notes = document.getElementById('item-notes').value;
            
            if (!name) {
                alert('Please enter item name');
                return;
            }
            
            await db.collection('trips').doc(activeTripId).collection('packing').add({
                name: name,
                quantity: quantity,
                person: person,
                category: category,
                house: house,
                notes: notes,
                packed: false,
                addedBy: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('item-name').value = '';
            document.getElementById('item-quantity').value = '1';
            document.getElementById('item-person').value = 'Mary';
            document.getElementById('item-category').value = 'Clothes';
            document.getElementById('item-house').value = "Mary's House";
            document.getElementById('item-notes').value = '';
            
            loadPackingList();
        }
        
        async function openEditModal(itemId) {
            editingItemId = itemId;
            
            const doc = await db.collection('trips').doc(activeTripId)
                .collection('packing').doc(itemId).get();
            
            if (doc.exists) {
                const item = doc.data();
                document.getElementById('edit-name').value = item.name || '';
                document.getElementById('edit-quantity').value = item.quantity || 1;
                document.getElementById('edit-person').value = item.person || 'Mary';
                document.getElementById('edit-category').value = item.category || 'Clothes';
                document.getElementById('edit-house').value = item.house || "Mary's House";
                document.getElementById('edit-notes').value = item.notes || '';
                
                document.getElementById('edit-modal').classList.add('show');
            }
        }
        
        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('show');
            editingItemId = null;
        }
        
        async function saveEdit() {
            const name = document.getElementById('edit-name').value;
            const quantity = parseInt(document.getElementById('edit-quantity').value) || 1;
            const person = document.getElementById('edit-person').value;
            const category = document.getElementById('edit-category').value;
            const house = document.getElementById('edit-house').value;
            const notes = document.getElementById('edit-notes').value;
            
            if (!name) {
                alert('Please enter item name');
                return;
            }
            
            await db.collection('trips').doc(activeTripId)
                .collection('packing').doc(editingItemId).update({
                    name: name,
                    quantity: quantity,
                    person: person,
                    category: category,
                    house: house,
                    notes: notes
                });
            
            closeEditModal();
            loadPackingList();
        }
        
        async function togglePacked(itemId, packed) {
            await db.collection('trips').doc(activeTripId)
                .collection('packing').doc(itemId).update({ 
                    packed: packed,
                    packedBy: packed ? currentUser.uid : null,
                    packedAt: packed ? firebase.firestore.FieldValue.serverTimestamp() : null
                });
            loadPackingList();
        }
        
        async function deleteItem(itemId) {
            if (confirm('Delete this item?')) {
                await db.collection('trips').doc(activeTripId)
                    .collection('packing').doc(itemId).delete();
                loadPackingList();
            }
        }
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then((reg) => console.log('✅ Service Worker registered'))
                .catch((err) => console.log('❌ Service Worker failed:', err));
        });
    }
    </script>
