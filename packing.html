<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Packing - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 1.8em; }
        .container { padding: 15px; }
        .progress-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .progress-card h3 { margin-bottom: 15px; text-align: center; color: #2c3e50; }
        .progress-bar {
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        .add-item-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .add-item-card h3 { margin-bottom: 15px; color: #2c3e50; }
        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            font-size: 1em;
        }
        .btn-add {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .items-list {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .items-list h3 { margin-bottom: 15px; color: #2c3e50; }
        .item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .item.packed {
            opacity: 0.6;
            text-decoration: line-through;
        }
        .item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        .item-content {
            flex: 1;
        }
        .item-name { font-weight: 700; color: #2c3e50; }
        .item-details { color: #7f8c8d; font-size: 0.9em; margin-top: 3px; }
        .house-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-top: 5px;
        }
        .house1 { background: #e3f2fd; color: #1976d2; }
        .house2 { background: #f3e5f5; color: #7b1fa2; }
        .house3 { background: #fff3e0; color: #f57c00; }
        .ship { background: #e8f5e9; color: #388e3c; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            font-weight: 600;
            padding: 8px 12px;
            min-width: 60px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.8em; margin-bottom: 4px; }
        .no-items { text-align: center; color: #999; padding: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧳 Packing List</h1>
    </div>

    <div class="container">
        <div class="progress-card">
            <h3>Packing Progress</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill">0%</div>
            </div>
        </div>
        
        <div class="add-item-card">
            <h3>Add Item</h3>
            <div class="form-row">
                <input type="text" id="item-name" placeholder="Item name">
                <input type="number" id="item-qty" placeholder="Qty" value="1">
            </div>
            <div class="form-group">
                <select id="item-house">
                    <option value="house1">House 1</option>
                    <option value="house2">House 2</option>
                    <option value="house3">House 3</option>
                    <option value="ship">Buy on Ship</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="item-notes" placeholder="Notes (optional)">
            </div>
            <button class="btn-add" onclick="addItem()">+ Add to List</button>
        </div>
        
        <div class="items-list">
            <h3>My Items</h3>
            <div id="items-container">
                <div class="no-items">No items added yet</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="schedule.html" class="nav-item">
            <div class="nav-item-icon">🗓️</div>
            <div>Days</div>
        </a>
        <a href="packing.html" class="nav-item active">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUser = null;
        
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                loadItems();
            }
        });
        
        async function loadItems() {
            const snapshot = await db.collection('users').doc(currentUser.uid).collection('packing').get();
            
            const container = document.getElementById('items-container');
            
            if (snapshot.empty) {
                container.innerHTML = '<div class="no-items">No items added yet</div>';
                updateProgress(0, 0);
                return;
            }
            
            container.innerHTML = '';
            let totalItems = 0;
            let packedItems = 0;
            
            snapshot.forEach(doc => {
                const item = doc.data();
                totalItems++;
                if (item.packed) packedItems++;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = `item ${item.packed ? 'packed' : ''}`;
                itemDiv.innerHTML = `
                    <input type="checkbox" ${item.packed ? 'checked' : ''} 
                           onchange="togglePacked('${doc.id}', this.checked)">
                    <div class="item-content">
                        <div class="item-name">${item.name} ${item.quantity > 1 ? `(${item.quantity})` : ''}</div>
                        ${item.notes ? `<div class="item-details">${item.notes}</div>` : ''}
                        <span class="house-tag ${item.house}">${getHouseLabel(item.house)}</span>
                    </div>
                `;
                container.appendChild(itemDiv);
            });
            
            updateProgress(packedItems, totalItems);
        }
        
        function getHouseLabel(house) {
            const labels = {
                house1: 'House 1',
                house2: 'House 2',
                house3: 'House 3',
                ship: 'Buy on Ship'
            };
            return labels[house] || house;
        }
        
        function updateProgress(packed, total) {
            const percentage = total > 0 ? Math.round((packed / total) * 100) : 0;
            const fill = document.getElementById('progress-fill');
            fill.style.width = percentage + '%';
            fill.textContent = percentage + '%';
        }
        
        async function addItem() {
            const name = document.getElementById('item-name').value;
            const quantity = parseInt(document.getElementById('item-qty').value) || 1;
            const house = document.getElementById('item-house').value;
            const notes = document.getElementById('item-notes').value;
            
            if (!name) {
                alert('Please enter item name');
                return;
            }
            
            await db.collection('users').doc(currentUser.uid).collection('packing').add({
                name: name,
                quantity: quantity,
                house: house,
                notes: notes,
                packed: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('item-name').value = '';
            document.getElementById('item-qty').value = '1';
            document.getElementById('item-notes').value = '';
            
            loadItems();
        }
        
        async function togglePacked(itemId, packed) {
            await db.collection('users').doc(currentUser.uid).collection('packing').doc(itemId).update({
                packed: packed
            });
            loadItems();
        }
    </script>
</body>
</html>
