<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/thumbs/240/apple/354/ship_1f6a2.png">
    <title>Packing List - Cruise Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            padding: 30px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }
        .header h1 { font-size: 2.2em; margin-bottom: 5px; }
        .header p { opacity: 0.9; }
        .container { padding: 15px; }
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-add, .btn-print {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            color: white;
        }
        .btn-add {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        .btn-print {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .stats-bar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        .stats-number {
            font-size: 2em;
            font-weight: 900;
            color: #fa709a;
        }
        .stats-label {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .filter-section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .filter-header {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1em;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 14px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85em;
            cursor: pointer;
            color: #555;
            transition: all 0.3s;
        }
        .filter-btn:hover {
            background: #e9ecef;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            border-color: #fa709a;
        }
        .filter-divider {
            margin: 10px 0;
            border-top: 1px solid #e0e0e0;
        }
        .category-section {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .category-header {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .packing-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .packing-item.packed {
            opacity: 0.5;
            background: #e8f8f5;
        }
        .packing-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .packing-content {
            flex: 1;
        }
        .packing-name {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 4px;
        }
        .packing-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.85em;
        }
        .meta-badge {
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: 600;
        }
        .badge-person {
            background: #e3f2fd;
            color: #1565c0;
        }
        .badge-qty {
            background: #fff3e0;
            color: #e65100;
        }
        .badge-house {
            background: #f3e5f5;
            color: #6a1b9a;
        }
        .packing-notes {
            font-size: 0.85em;
            color: #555;
            margin-top: 5px;
            font-style: italic;
        }
        .item-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }
        .btn-edit-item, .btn-delete-item {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.8em;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-edit-item {
            background: #3498db;
            color: white;
        }
        .btn-delete-item {
            background: #e74c3c;
            color: white;
        }
        .no-items {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-style: italic;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-header {
            font-size: 1.5em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-label {
            display: block;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }
        .form-textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn-save, .btn-cancel {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1em;
            margin-right: 10px;
        }
        .btn-save {
            background: #27ae60;
            color: white;
        }
        .btn-cancel {
            background: #95a5a6;
            color: white;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 0.6em;
            font-weight: 600;
            padding: 8px 6px;
            min-width: 48px;
        }
        .nav-item.active { color: white; background: rgba(255,255,255,0.15); border-radius: 12px; }
        .nav-item-icon { font-size: 1.6em; margin-bottom: 4px; }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .header, .bottom-nav, .action-buttons, .stats-bar, .item-actions, .filter-section {
                display: none !important;
            }
            .container {
                padding: 0;
                columns: 2;
                column-gap: 20px;
            }
            .category-section {
                box-shadow: none;
                border: 1px solid #ddd;
                padding: 10px;
                margin-bottom: 10px;
                break-inside: avoid;
                page-break-inside: avoid;
            }
            .category-header {
                font-size: 11pt;
                margin-bottom: 8px;
                border-bottom: 2px solid #333;
                padding-bottom: 5px;
            }
            .packing-item {
                background: white;
                padding: 6px;
                margin-bottom: 6px;
                border: 1px solid #e0e0e0;
                font-size: 9pt;
                page-break-inside: avoid;
            }
            .packing-item.packed {
                opacity: 1;
                background: white;
            }
            .packing-checkbox {
                width: 14px;
                height: 14px;
                border: 2px solid #333;
                background: white;
                appearance: none;
                -webkit-appearance: none;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
            .packing-name {
                font-size: 9pt;
                color: black;
            }
            .packing-meta {
                font-size: 8pt;
                color: #555;
            }
            .meta-badge {
                background: none;
                border: 1px solid #999;
                color: black;
                padding: 2px 5px;
            }
            .packing-notes {
                font-size: 8pt;
                color: #666;
            }
            .no-items {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧳 Packing List</h1>
        <p>What to bring on your cruise</p>
    </div>

    <div class="container">
        <div class="action-buttons">
            <button class="btn-add" onclick="showAddItemModal()">+ Add Item</button>
            <button class="btn-print" onclick="window.print()">🖨️ Print List</button>
        </div>

        <div class="stats-bar">
            <div class="stats-number" id="stats-display">0 / 0</div>
            <div class="stats-label">Items Packed</div>
        </div>

        <div class="filter-section">
            <div class="filter-header">🔍 Filters</div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="applyFilter('all', 'all')">Show All</button>
                <button class="filter-btn" onclick="applyFilter('status', 'unpacked')">❌ Unpacked</button>
                <button class="filter-btn" onclick="applyFilter('status', 'packed')">✅ Packed</button>
            </div>
            <div class="filter-divider"></div>
            <div class="filter-header">👤 Person</div>
            <div class="filter-buttons">
                <button class="filter-btn" onclick="applyFilter('person', 'Mary')">Mary</button>
                <button class="filter-btn" onclick="applyFilter('person', 'Brian')">Brian</button>
                <button class="filter-btn" onclick="applyFilter('person', 'Shared')">Shared</button>
            </div>
            <div class="filter-divider"></div>
            <div class="filter-header">📦 Category</div>
            <div class="filter-buttons">
                <button class="filter-btn" onclick="applyFilter('category', 'Clothing')">👕 Clothing</button>
                <button class="filter-btn" onclick="applyFilter('category', 'Toiletries')">🧴 Toiletries</button>
                <button class="filter-btn" onclick="applyFilter('category', 'Electronics')">🔌 Electronics</button>
                <button class="filter-btn" onclick="applyFilter('category', 'Documents')">📄 Documents</button>
                <button class="filter-btn" onclick="applyFilter('category', 'Medications')">💊 Medications</button>
                <button class="filter-btn" onclick="applyFilter('category', 'Beach/Pool')">🏖️ Beach</button>
            </div>
            <div class="filter-divider"></div>
            <div class="filter-header">🏠 Location</div>
            <div class="filter-buttons">
                <button class="filter-btn" onclick="applyFilter('house', 'Mary\'s House')">Mary's House</button>
                <button class="filter-btn" onclick="applyFilter('house', 'Brian\'s House')">Brian's House</button>
                <button class="filter-btn" onclick="applyFilter('house', 'Need to Buy')">🛒 Need to Buy</button>
            </div>
        </div>

        <div id="packing-container"></div>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">Add Packing Item</div>
            <form id="itemForm">
                <div class="form-group">
                    <label class="form-label">Item Name *</label>
                    <input type="text" id="itemName" class="form-input" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Quantity</label>
                        <input type="number" id="quantity" class="form-input" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Person</label>
                        <select id="person" class="form-select">
                            <option value="Shared">Shared</option>
                            <option value="Mary">Mary</option>
                            <option value="Brian">Brian</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select id="category" class="form-select" required>
                            <option value="Clothing">Clothing</option>
                            <option value="Toiletries">Toiletries</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Documents">Documents</option>
                            <option value="Medications">Medications</option>
                            <option value="Beach/Pool">Beach/Pool</option>
                            <option value="Accessories">Accessories</option>
                            <option value="Misc">Miscellaneous</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Location</label>
                        <select id="house" class="form-select">
                            <option value="">Not Specified</option>
                            <option value="Mary's House">Mary's House</option>
                            <option value="Brian's House">Brian's House</option>
                            <option value="Need to Buy">Need to Buy</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Notes</label>
                    <textarea id="notes" class="form-textarea" placeholder="Optional notes..."></textarea>
                </div>
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn-save">Save Item</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-item-icon">🏠</div>
            <div>Home</div>
        </a>
        <a href="itinerary.html" class="nav-item">
            <div class="nav-item-icon">🗺️</div>
            <div>Trip</div>
        </a>
        <a href="schedule.html" class="nav-item">
            <div class="nav-item-icon">🗓️</div>
            <div>Days</div>
        </a>
        <a href="packing.html" class="nav-item active">
            <div class="nav-item-icon">🧳</div>
            <div>Pack</div>
        </a>
        <a href="notes.html" class="nav-item">
            <div class="nav-item-icon">📝</div>
            <div>Notes</div>
        </a>
        <a href="journal.html" class="nav-item">
            <div class="nav-item-icon">📔</div>
            <div>Journal</div>
        </a>
        <a href="settings.html" class="nav-item">
            <div class="nav-item-icon">⚙️</div>
            <div>Set</div>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmuGiKOj_O1A2gt3j_5FDpAoLS1_hBMz4",
            authDomain: "cruise-planner-2026.firebaseapp.com",
            projectId: "cruise-planner-2026",
            storageBucket: "cruise-planner-2026.firebasestorage.app",
            messagingSenderId: "554027862680",
            appId: "1:554027862680:web:d6a392181aca12fe8a5eed"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        db.enablePersistence({ synchronizeTabs: true }).catch((err) => console.log('Offline:', err.code));
        
        let currentUser = null;
        let activeTripId = null;
        let editingItemId = null;
        let allItems = [];
        let currentFilter = { type: 'all', value: 'all' };
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                activeTripId = localStorage.getItem('activeTripId');
                if (!activeTripId) {
                    alert('No active trip. Go to Settings to create one.');
                    window.location.href = 'settings.html';
                } else {
                    await loadPackingList();
                }
            }
        });
        
        async function loadPackingList() {
            const snapshot = await db.collection('trips').doc(activeTripId).collection('packing').get();
            allItems = [];
            snapshot.forEach(doc => {
                allItems.push({ id: doc.id, ...doc.data() });
            });
            
            renderPackingList();
        }
        
        function applyFilter(type, value) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (type === 'all') {
                currentFilter = { type: 'all', value: 'all' };
            } else {
                currentFilter = { type, value };
            }
            
            renderPackingList();
        }
        
        function filterItems(items) {
            if (currentFilter.type === 'all') return items;
            
            return items.filter(item => {
                if (currentFilter.type === 'status') {
                    if (currentFilter.value === 'packed') return item.packed === true;
                    if (currentFilter.value === 'unpacked') return !item.packed;
                }
                if (currentFilter.type === 'person') {
                    return item.person === currentFilter.value;
                }
                if (currentFilter.type === 'category') {
                    return item.category === currentFilter.value;
                }
                if (currentFilter.type === 'house') {
                    return item.house === currentFilter.value;
                }
                return true;
            });
        }
        
        function renderPackingList() {
            const filteredItems = filterItems(allItems);
            const categories = {};
            
            filteredItems.forEach(item => {
                const cat = item.category || 'Miscellaneous';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(item);
            });
            
            let totalItems = filteredItems.length;
            let packedItems = filteredItems.filter(i => i.packed).length;
            document.getElementById('stats-display').textContent = `${packedItems} / ${totalItems}`;
            
            const container = document.getElementById('packing-container');
            container.innerHTML = '';
            
            if (totalItems === 0) {
                container.innerHTML = `
                    <div class="category-section">
                        <div class="no-items">No items match your filter. Try "Show All"!</div>
                    </div>
                `;
                return;
            }
            
            const categoryOrder = ['Documents', 'Medications', 'Clothing', 'Toiletries', 'Electronics', 'Beach/Pool', 'Accessories', 'Miscellaneous'];
            const categoryIcons = {
                'Documents': '📄',
                'Medications': '💊',
                'Clothing': '👕',
                'Toiletries': '🧴',
                'Electronics': '🔌',
                'Beach/Pool': '🏖️',
                'Accessories': '👜',
                'Miscellaneous': '📦'
            };
            
            categoryOrder.forEach(catName => {
                if (!categories[catName]) return;
                
                const items = categories[catName];
                const icon = categoryIcons[catName] || '📦';
                
                let itemsHTML = '';
                items.forEach(item => {
                    const badges = [];
                    if (item.person) badges.push(`<span class="meta-badge badge-person">${item.person}</span>`);
                    if (item.quantity > 1) badges.push(`<span class="meta-badge badge-qty">Qty: ${item.quantity}</span>`);
                    if (item.house) badges.push(`<span class="meta-badge badge-house">${item.house}</span>`);
                    
                    itemsHTML += `
                        <div class="packing-item ${item.packed ? 'packed' : ''}">
                            <input type="checkbox" class="packing-checkbox" 
                                ${item.packed ? 'checked' : ''} 
                                onchange="togglePacked('${item.id}', this.checked)">
                            <div class="packing-content">
                                <div class="packing-name">${item.name}</div>
                                ${badges.length > 0 ? `<div class="packing-meta">${badges.join('')}</div>` : ''}
                                ${item.notes ? `<div class="packing-notes">${item.notes}</div>` : ''}
                            </div>
                            <div class="item-actions">
                                <button class="btn-edit-item" onclick="editItem('${item.id}')">Edit</button>
                                <button class="btn-delete-item" onclick="deleteItem('${item.id}')">Del</button>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML += `
                    <div class="category-section">
                        <div class="category-header">${icon} ${catName}</div>
                        ${itemsHTML}
                    </div>
                `;
            });
        }
        
        async function togglePacked(itemId, packed) {
            await db.collection('trips').doc(activeTripId).collection('packing').doc(itemId).update({ packed });
            await loadPackingList();
        }
        
        function showAddItemModal() {
            editingItemId = null;
            document.getElementById('modal-title').textContent = 'Add Packing Item';
            document.getElementById('itemForm').reset();
            document.getElementById('quantity').value = 1;
            document.getElementById('itemModal').style.display = 'block';
        }
        
        function editItem(itemId) {
            editingItemId = itemId;
            const item = allItems.find(i => i.id === itemId);
            if (!item) return;
            
            document.getElementById('modal-title').textContent = 'Edit Packing Item';
            document.getElementById('itemName').value = item.name;
            document.getElementById('quantity').value = item.quantity || 1;
            document.getElementById('person').value = item.person || 'Shared';
            document.getElementById('category').value = item.category || 'Misc';
            document.getElementById('house').value = item.house || '';
            document.getElementById('notes').value = item.notes || '';
            document.getElementById('itemModal').style.display = 'block';
        }
        
        async function deleteItem(itemId) {
            if (!confirm('Delete this item?')) return;
            await db.collection('trips').doc(activeTripId).collection('packing').doc(itemId).delete();
            await loadPackingList();
        }
        
        function closeModal() {
            document.getElementById('itemModal').style.display = 'none';
        }
        
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const itemData = {
                name: document.getElementById('itemName').value,
                quantity: parseInt(document.getElementById('quantity').value) || 1,
                person: document.getElementById('person').value,
                category: document.getElementById('category').value,
                house: document.getElementById('house').value,
                notes: document.getElementById('notes').value,
                packed: false,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            if (editingItemId) {
                const existingItem = allItems.find(i => i.id === editingItemId);
                itemData.packed = existingItem ? existingItem.packed : false;
                await db.collection('trips').doc(activeTripId).collection('packing').doc(editingItemId).update(itemData);
            } else {
                await db.collection('trips').doc(activeTripId).collection('packing').add(itemData);
            }
            
            closeModal();
            await loadPackingList();
        });
    </script>
</body>
</html>
